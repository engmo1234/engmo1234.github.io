<style>

#lobby{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;padding:20px;}

#bsvg{width:100%;height:100%;display:block;}
.ctrl{width:100%;max-width:560px;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;}

.dlbl{font-size:.72rem;color:#a09060;font-weight:600;text-align:center;}

.pname{font-size:.78rem;font-weight:800;display:flex;align-items:center;gap:6px;}
.pdot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.ptoks{display:flex;gap:5px;flex-wrap:wrap;}

.pstat{font-size:.65rem;color:#8a8070;}
.wpanel{background:rgba(0,0,0,.4);border:1px solid rgba(245,215,110,.2);border-radius:14px;padding:14px 18px;width:100%;max-width:560px;}

.le{padding:1px 0;border-bottom:1px solid rgba(255,255,255,.04);}

</style>

(function(){

    {app:'https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js',
     db: 'https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js'},

     db: 'https://unpkg.com/firebase@9.22.2/firebase-database-compat.js'}
  ];
  var tried = 0;

  function showError(){
    document.body.style.cssText='background:#0a0a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;';
    document.body.innerHTML='<div style="text-align:center;padding:24px;color:#f0e8d0;font-family:sans-serif;max-width:400px;">'

  function loadDB(cdn){
    var s=document.createElement('script');
    s.src=cdn.db;

    s.onerror=function(){
      tried++;
      if(tried<CDNS.length) loadApp(CDNS[tried]);
      else showError();
    };
    document.head.appendChild(s);
  }

  function loadApp(cdn){
    var s=document.createElement('script');
    s.src=cdn.app;
    s.onload=function(){ loadDB(cdn); };
    s.onerror=function(){
      tried++;
      if(tried<CDNS.length) loadApp(CDNS[tried]);
      else showError();
    };
    document.head.appendChild(s);
  }

  loadApp(CDNS[0]);
})();
</script>

      var sh=mkEl('circle',{cx:cx2+2,cy:cy2+3,r:r,fill:'rgba(0,0,0,.22)'});layer.appendChild(sh);
      var body=mkEl('circle',{cx:cx2,cy:cy2,r:r,fill:CHex[color],stroke:movable?'#f5d76e':CDark[color],'stroke-width':movable?3:2});
      if(movable){body.style.cursor='pointer';body.style.filter='drop-shadow(0 0 6px '+CHex[color]+')';(function(c,t){body.addEventListener('click',function(){doMove(c,t);});})(ci,ti);}
      layer.appendChild(body);
      var inner=mkEl('circle',{cx:cx2,cy:cy2,r:r*.42,fill:'#fff',opacity:.65});layer.appendChild(inner);
      var lbl=mkEl('text',{x:cx2,y:cy2,'font-size':r*.85,fill:CDark[color],'text-anchor':'middle','dominant-baseline':'central','font-weight':'900','pointer-events':'none'});lbl.textContent=ti+1;layer.appendChild(lbl);
    }
  }
}
function doRoll(){
  if(!roomRef||!state||state.turn!==myId||state.diceRolled||state.phase!=='playing'||rolling)return;
  rolling=true;
  var btn=document.getElementById('diceBtn');btn.disabled=true;btn.classList.add('rolling');
  var count=0,iv=setInterval(function(){btn.innerHTML=DFACE[Math.ceil(Math.random()*6)];if(++count>8)clearInterval(iv);},70);
  setTimeout(function(){
    btn.classList.remove('rolling');
    var dice=Math.ceil(Math.random()*6);
    btn.innerHTML=DFACE[dice];rolling=false;
    var s=JSON.parse(JSON.stringify(state));
    s.dice=dice;s.diceRolled=true;
    addLog(s,s.names[myId]+' rolled a '+dice+'!',dice===6);
    if(!anyMove(myId,dice)){addLog(s,'No moves - passing turn.');doPass(s);}
    else roomRef.set(s);
  },600);
}
function doMove(ci,ti){
  if(!roomRef||!state||state.turn!==myId||ci!==myId||!state.diceRolled)return;
  var dice=state.dice;if(!canMove(ci,ti,dice))return;
  var s=JSON.parse(JSON.stringify(state));
  var pos=s.tokens[ci][ti],np;
  if(pos===-1){np=0;addLog(s,s.names[ci]+' brings out token '+(ti+1)+'!',true);}
  else if(pos>=52){np=pos+dice;if(np>57)np=57;}
  else{np=pos+dice;if(np>=52)np=52+(np-52);}
  s.tokens[ci][ti]=np;
  if(np>=57){s.finished[ci][ti]=true;s.tokens[ci][ti]=58;addLog(s,s.names[ci]+' token '+(ti+1)+' home!',true);}
  if(np>=0&&np<52){
    var myP=gpath(ci),mySq=myP[np];
    for(var p=0;p<s.playerCount;p++){
      if(p===ci)continue;
      for(var t=0;t<4;t++){
        var op=s.tokens[p][t];if(op<0||op>=52)continue;
        var oppSq=gpath(p)[op];
        if(mySq&&oppSq&&mySq[0]===oppSq[0]&&mySq[1]===oppSq[1]&&SAFE.indexOf(np)<0){s.tokens[p][t]=-1;addLog(s,s.names[ci]+' captured '+s.names[p]+' token '+(t+1)+'!',true);}
      }
    }
  }
  if(s.finished[ci].every(Boolean)){s.winner=ci;s.phase='done';addLog(s,''+s.names[ci]+' wins!',true);roomRef.set(s);return;}
  if(dice===6){s.diceRolled=false;s.dice=null;addLog(s,s.names[ci]+' gets extra turn!');roomRef.set(s);return;}
  doPass(s);
}
function doPass(s){s.diceRolled=false;s.dice=null;var n=(s.turn+1)%s.playerCount;for(var i=0;i<s.playerCount;i++){if(!s.finished[n]||!s.finished[n].every(Boolean))break;n=(n+1)%s.playerCount;}s.turn=n;roomRef.set(s);}
function doReset(){if(!roomRef||!state)return;var g=freshGame(state.playerCount);g.names=state.names.slice();g.connected=state.connected.slice();g.phase='playing';roomRef.set(g);}
function render(){
  if(!state)return;
  var phase=state.phase||'waiting',over=phase==='done',ismine=state.turn===myId&&phase==='playing';
  var names=state.names||[],conn=state.connected||[];
  var tb=document.getElementById('tbadge');
  if(over){tb.textContent='Game Over';tb.style.background='#333';tb.style.color='#888';}
  else if(phase==='waiting'){tb.textContent='Waiting...';tb.style.background='#333';tb.style.color='#888';}
  else{tb.textContent=ismine?'Your Turn':(esc(names[state.turn]||'?')+"'s Turn");tb.style.background=ismine?'#e53935':CHex[COLS[state.turn]];tb.style.color='#fff';}
  var sb=document.getElementById('sbar');
  var cn=conn.filter(Boolean).length;
  if(phase==='waiting')sb.textContent='Waiting for players... ('+cn+'/'+state.playerCount+' connected)';
  else if(over)sb.textContent=''+esc(names[state.winner]||'?')+' wins! Press New Game.';
  else if(ismine)sb.textContent=!state.diceRolled?'Your turn - roll the dice!':(anyMove(myId,state.dice)?'Click a glowing token to move (rolled '+state.dice+')':'No valid moves...');
  else sb.textContent=esc(names[state.turn]||'?')+"'s turn...";
  var db2=document.getElementById('diceBtn'),dl=document.getElementById('dlbl');
  db2.disabled=!(ismine&&!state.diceRolled&&!over);
  if(!rolling)db2.innerHTML=state.dice?DFACE[state.dice]:'&#127922;';
  dl.textContent=ismine&&!state.diceRolled?'Tap to roll!':(state.dice?'Rolled '+state.dice:'');
  var pp=document.getElementById('ppanel'),wp=document.getElementById('wpanel');
  if(phase==='waiting'){
    wp.style.display='';pp.style.display='none';
    var ws=document.getElementById('wslots');ws.innerHTML='';
    for(var i=0;i<state.playerCount;i++){var d=document.createElement('div');d.className='wslot';d.innerHTML='<div style="width:10px;height:10px;border-radius:50%;background:'+(conn[i]?CHex[COLS[i]]:'#555')+'"></div><span style="color:'+(conn[i]?'#f0e8d0':'#666')+'">'+(conn[i]?esc(names[i]||'?'):'Waiting for player '+(i+1))+(i===myId?' (You)':'')+'</span>';ws.appendChild(d);}
  }else{
    wp.style.display='none';pp.style.display='grid';pp.innerHTML='';
    for(var j=0;j<state.playerCount;j++){
      var color=COLS[j],isact=state.turn===j&&!over;
      var card=document.createElement('div');card.className='pcard'+(isact?' myturn':'');
      var pips='';for(var k=0;k<4;k++){var pd=state.finished[j]&&state.finished[j][k],pp2=state.tokens[j][k];pips+='<div class="tpip '+(pd?'done':pp2===-1?'home':'')+'" style="background:'+CHex[color]+';border-color:'+CDark[color]+';">'+(k+1)+'</div>';}
      var fin=(state.finished[j]||[]).filter(Boolean).length;
      card.innerHTML='<div class="pname"><div class="pdot" style="background:'+CHex[color]+'"></div><span style="color:'+CHex[color]+'">'+esc(names[j]||'?')+(j===myId?' (You)':'')+'</span>'+(isact?'<span style="margin-left:auto;font-size:.6rem;color:var(--gold)">TURN</span>':'')+'</div><div class="ptoks">'+pips+'</div><div class="pstat">'+fin+'/4 home</div>';
      pp.appendChild(card);
    }
  }
  renderTokens();
  var gl=document.getElementById('glog');gl.innerHTML='';
  fa(state.log).slice(-8).forEach(function(e){var d=document.createElement('div');d.className='le'+(e.imp?' imp':'');d.textContent=e.text;gl.appendChild(d);});gl.scrollTop=9999;
  var wm=document.getElementById('winModal');
  if(over&&state.winner!=null){wm.classList.add('open');document.getElementById('wtitle').textContent=state.winner===myId?'You Win!':'You Lost!';document.getElementById('wsub').textContent=esc(names[state.winner]||'?')+' wins!';}
  else wm.classList.remove('open');
}
document.getElementById('keyBtn').addEventListener('click',function(){
  var v=document.getElementById('keyInput').value.trim();
  if(v===KEY){document.getElementById('keyScreen').style.display='none';document.getElementById('lobby').style.display='flex';}
  else{var err=document.getElementById('keyErr');err.textContent='Wrong key - try again!';var inp=document.getElementById('keyInput');inp.value='';inp.classList.remove('shake');void inp.offsetWidth;inp.classList.add('shake');inp.focus();setTimeout(function(){err.textContent='';},2500);}
});
document.getElementById('keyInput').addEventListener('keypress',function(e){if(e.key==='Enter')document.getElementById('keyBtn').click();});
document.querySelectorAll('.pcbtn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.pcbtn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');selCount=+btn.dataset.n;});});
document.getElementById('joinBtn').addEventListener('click',function(){
  var pass=document.getElementById('passIn').value.trim();
  var name=document.getElementById('nameIn').value.trim()||'Player';
  if(!pass){alert('Enter a room password');return;}
  myName=name;
  var roomId='ludo_'+btoa(unescape(encodeURIComponent(pass))).replace(/[^a-zA-Z0-9]/g,'').substring(0,28);
  var ref=db.ref('ludoRooms/'+roomId);
  ref.once('value').then(function(snap){
    var ex=snap.val();
    if(!ex||!ex.tokens){myId=0;var g=freshGame(selCount);g.names[0]=name;g.connected[0]=true;return ref.set(g);}
    var conn=fa(ex.connected),exnames=fa(ex.names);
    for(var i=0;i<exnames.length;i++){if(!conn[i]){myId=i;return Promise.all([ref.child('names/'+i).set(name),ref.child('connected/'+i).set(true)]);}}
    myId=exnames.length-1;return Promise.all([ref.child('names/'+myId).set(name),ref.child('connected/'+myId).set(true)]);
  }).then(function(){
    document.getElementById('lobby').style.display='none';
    document.getElementById('game').style.display='flex';
    roomRef=ref;
    roomRef.on('value',function(snap){
      var d=snap.val();if(!d||!d.tokens){document.getElementById('sbar').textContent='Data missing - press New Game';return;}
      state=norm(d);
      if(state.phase==='waiting'&&state.connected.filter(Boolean).length>=state.playerCount&&myId===0)roomRef.child('phase').set('playing');
      render();
    });
  }).catch(function(err){alert('Connection error: '+err.message);});
});
document.getElementById('diceBtn').addEventListener('click',doRoll);
document.getElementById('resetBtn').addEventListener('click',doReset);
document.getElementById('winResetBtn').addEventListener('click',doReset);
document.getElementById('leaveBtn').addEventListener('click',function(){if(roomRef&&state)roomRef.child('connected/'+myId).set(false);document.getElementById('game').style.display='none';document.getElementById('lobby').style.display='flex';roomRef=null;state=null;myId=null;});
drawBoard();
} // end startGame
</script>
