<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UNO PRESTIGE | DEFINITIVE EDITION</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card-w: 90px;
            --card-h: 135px;
            --gold: #fbbf24;
            --red: #ef4444;
            --blue: #3b82f6;
            --green: #22c55e;
            --yellow: #eab308;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: #f8fafc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- LOBBY OVERLAY --- */
        #lobby {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(2, 6, 23, 0.95);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .lobby-box {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 3rem; border-radius: 2.5rem; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 90%; max-width: 450px;
        }

        /* --- MAIN GAME GRID --- */
        #mainStage {
            display: none; height: 100vh; width: 100vw;
            grid-template-columns: 1fr 350px;
        }
        
        .table-area {
            position: relative; display: flex; flex-direction: column;
            justify-content: space-between; padding: 40px;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* --- CARDS & HANDS --- */
        .hand {
            display: flex; justify-content: center; align-items: center;
            height: 180px; width: 100%;
        }
        
        .card {
            width: var(--card-w); height: var(--card-h);
            border-radius: 12px; border: 4px solid #fff;
            position: relative; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: 900; color: #fff;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            margin-left: -35px; text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        .card:first-child { margin-left: 0; }
        .card:hover { transform: translateY(-40px) scale(1.15) rotate(3deg); z-index: 200; box-shadow: 0 20px 30px rgba(0,0,0,0.6); }
        
        .card.red { background: var(--red); }
        .card.blue { background: var(--blue); }
        .card.green { background: var(--green); }
        .card.yellow { background: var(--yellow); color: #1e293b; }
        .card.wild { background: linear-gradient(45deg, #ff4d4d, #4d94ff, #47d147, #ffcc00); border-color: #f8fafc; }
        
        .card-back {
            background: #1e293b; border: 3px solid var(--gold);
            width: 70px; height: 105px; border-radius: 10px; margin-left: -45px;
            box-shadow: 5px 0 10px rgba(0,0,0,0.3); transform: rotate(-2deg);
        }

        /* --- CENTER DECK --- */
        .center-pile {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 60px;
        }
        .pile-anchor {
            width: 120px; height: 170px; border-radius: 15px;
            border: 2px dashed rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        #drawDeckBtn { 
            background: #1e293b; border: 3px solid var(--gold); color: var(--gold);
            font-size: 3rem; cursor: pointer; transition: 0.2s;
        }
        #drawDeckBtn:active { transform: scale(0.9) rotate(-5deg); }

        /* --- SIDEBAR & CHAT --- */
        .sidebar {
            background: rgba(2, 6, 23, 0.5); border-left: 1px solid var(--border);
            backdrop-filter: blur(10px); display: flex; flex-direction: column;
        }
        .game-info { padding: 25px; border-bottom: 1px solid var(--border); }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; max-width: 85%; }
        .msg.me { align-self: flex-end; background: #334155; color: #fff; }
        .msg.them { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); }
        .msg.system { align-self: center; background: none; color: var(--gold); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }

        .chat-input-row { padding: 20px; background: rgba(0,0,0,0.2); }
        .emoji-bar { display: flex; justify-content: space-around; margin-bottom: 12px; cursor: pointer; font-size: 1.4rem; }
        
        /* --- BUTTONS & INPUTS --- */
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: #0f172a; color: white; margin-bottom: 15px; font-size: 1rem;
        }
        .btn-prime {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--gold); color: #000; font-weight: 800; cursor: pointer; font-size: 1rem;
        }
        .btn-prime:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            z-index: 2000; display: none; place-items: center;
        }
        .modal-overlay.show { display: grid; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .color-btn { width: 100px; height: 100px; border-radius: 50%; border: 5px solid #fff; cursor: pointer; transition: 0.2s; }
        .color-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="lobby">
    <div class="lobby-box">
        <h1 style="color:var(--gold); margin-top:0; letter-spacing: 2px;">UNO PRESTIGE</h1>
        <p style="opacity: 0.7; margin-bottom: 2rem;">Enter room code to challenge a friend</p>
        <input type="text" id="roomInput" placeholder="Room Name (e.g. LEGEND-1)">
        <button class="btn-prime" onclick="startSession()">JOIN MATCH</button>
    </div>
</div>

<div id="mainStage">
    <div class="table-area">
        <div class="hand" id="opponentHand"></div>
        
        <div class="center-pile">
            <div class="pile-anchor">
                <button id="drawDeckBtn" class="card">🎴</button>
            </div>
            <div class="pile-anchor" id="activeDiscard"></div>
        </div>

        <div class="hand" id="playerHand"></div>
        
        <div style="display:flex; gap:15px; justify-content:center;">
            <button class="btn-prime" style="width:140px; background: #ea580c; color: white;" onclick="triggerUno('uno')">UNO!</button>
            <button class="btn-prime" style="width:140px; background: #475569; color: white;" onclick="triggerUno('catch')">CATCH</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="game-info">
            <h2 id="turnIndicator" style="margin:0; font-size: 1.2rem;">Connecting...</h2>
            <p id="matchLog" style="font-size: 0.8rem; opacity: 0.6; margin: 10px 0 0 0;">Waiting for opponent to join.</p>
        </div>
        <div class="chat-container">
            <div id="chatBox"></div>
            <div class="chat-input-row">
                <div class="emoji-bar">
                    <span onclick="quickEmoji('😂')">😂</span><span onclick="quickEmoji('🤡')">🤡</span>
                    <span onclick="quickEmoji('🔥')">🔥</span><span onclick="quickEmoji('💀')">💀</span>
                    <span onclick="quickEmoji('🙊')">🙊</span>
                </div>
                <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendText()">
            </div>
        </div>
    </div>
</div>

<div id="colorPicker" class="modal-overlay">
    <div style="text-align:center">
        <h2 style="color:white; margin-bottom:30px; letter-spacing:1px;">CHOOSE WILD COLOR</h2>
        <div class="color-grid">
            <div class="color-btn" style="background:var(--red)" onclick="selectWild('red')"></div>
            <div class="color-btn" style="background:var(--blue)" onclick="selectWild('blue')"></div>
            <div class="color-btn" style="background:var(--green)" onclick="selectWild('green')"></div>
            <div class="color-btn" style="background:var(--yellow)" onclick="selectWild('yellow')"></div>
        </div>
    </div>
</div>

<script>
// --- CORE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyCQ7QZFblWwB530G2ARVPHvYLAsDf0Mwak",
    authDomain: "chessgame-e4dbb.firebaseapp.com",
    projectId: "chessgame-e4dbb",
    databaseURL: "https://chessgame-e4dbb-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- LOYAL AUDIO ENGINE ---
const AudioEngine = {
    ctx: null,
    init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(type) {
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        const t = this.ctx.currentTime;

        if(type === 'play') {
            osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
        } else if(type === 'draw') {
            osc.type = 'square'; osc.frequency.setValueAtTime(200, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
        } else if(type === 'special') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
        }
        osc.start(); osc.stop(t + 0.5);
    }
};

// --- GAME VARIABLES ---
let gameState = null, myPlayerIdx = null, matchRef = null, pendingWildIdx = null;

async function startSession() {
    const room = document.getElementById('roomInput').value.trim().toUpperCase();
    if(!room) return alert("Please enter a room code.");
    
    matchRef = db.ref(`matches/${room}`);
    const snapshot = await matchRef.once('value');
    
    if(!snapshot.exists()) {
        myPlayerIdx = 0;
        const deck = buildDeck();
        await matchRef.set({
            players: { 
                0: { hand: deck.splice(0, 7), uno: false }, 
                1: { hand: deck.splice(0, 7), uno: false } 
            },
            drawPile: deck,
            discard: [deck.pop()],
            turn: 0,
            winner: null
        });
    } else {
        myPlayerIdx = 1;
    }

    document.getElementById('lobby').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('mainStage').style.display = 'grid';
    }, 500);
    
    matchRef.on('value', s => { gameState = s.val(); updateUI(); });
    setupChat(room);
}

function buildDeck() {
    const colors = ['red', 'blue', 'green', 'yellow'];
    let d = [];
    colors.forEach(c => {
        for(let i=0; i<=9; i++) { d.push({t:'num', c, v:i}); if(i>0) d.push({t:'num', c, v:i}); }
        for(let i=0; i<2; i++) { d.push({t:'skip', c}); d.push({t:'rev', c}); d.push({t:'d2', c}); }
    });
    for(let i=0; i<4; i++) { d.push({t:'wild'}); d.push({t:'w4'}); }
    return d.sort(() => Math.random() - 0.5);
}

function updateUI() {
    if(!gameState) return;
    const isMyTurn = gameState.turn === myPlayerIdx;
    const topCard = gameState.discard[gameState.discard.length - 1];

    document.getElementById('turnIndicator').innerText = gameState.winner !== null ? "MATCH ENDED" : (isMyTurn ? "🟢 YOUR TURN" : "🔴 OPPONENT'S TURN");
    document.getElementById('matchLog').innerText = isMyTurn ? "Pick a card to play or draw from the deck." : "Wait for the opponent to move.";

    // Opponent Render
    const oppHand = document.getElementById('opponentHand');
    oppHand.innerHTML = '';
    gameState.players[1-myPlayerIdx].hand.forEach(() => {
        const div = document.createElement('div'); div.className = 'card-back';
        oppHand.appendChild(div);
    });

    // Discard Render
    const disc = document.getElementById('activeDiscard');
    disc.innerHTML = '';
    disc.appendChild(renderCard(topCard));

    // Player Hand Render
    const playerHand = document.getElementById('playerHand');
    playerHand.innerHTML = '';
    gameState.players[myPlayerIdx].hand.forEach((card, idx) => {
        const ui = renderCard(card);
        if(isMyTurn && gameState.winner === null && checkLegality(card, topCard)) {
            ui.onclick = () => handleCardClick(idx);
        } else {
            ui.style.opacity = '0.35'; ui.style.cursor = 'default'; ui.style.transform = 'none';
        }
        playerHand.appendChild(ui);
    });

    document.getElementById('drawDeckBtn').onclick = isMyTurn ? drawFromDeck : null;
}

function renderCard(card) {
    const div = document.createElement('div');
    const isWild = card.t.includes('w');
    div.className = `card ${isWild ? 'wild' : card.c}`;
    
    let icon = card.v !== undefined ? card.v : '';
    if(card.t === 'skip') icon = '🚫';
    if(card.t === 'rev') icon = '⇄';
    if(card.t === 'd2') icon = '+2';
    if(card.t === 'wild') icon = 'W';
    if(card.t === 'w4') icon = '+4';
    
    div.innerHTML = `<span>${icon}</span>`;
    return div;
}

function checkLegality(card, top) {
    if(card.t.includes('w')) return true;
    return card.c === top.c || card.v === top.v || (card.t !== 'num' && card.t === top.t);
}

function handleCardClick(idx) {
    const card = gameState.players[myPlayerIdx].hand[idx];
    if(card.t.includes('w')) {
        pendingWildIdx = idx;
        document.getElementById('colorPicker').classList.add('show');
    } else {
        executeMove(idx);
    }
}

function selectWild(color) {
    document.getElementById('colorPicker').classList.remove('show');
    executeMove(pendingWildIdx, color);
}

async function executeMove(idx, wildColor = null) {
    AudioEngine.play(wildColor ? 'special' : 'play');
    const s = JSON.parse(JSON.stringify(gameState));
    const playedCard = s.players[myPlayerIdx].hand.splice(idx, 1)[0];
    
    if(wildColor) playedCard.c = wildColor;
    s.discard.push(playedCard);
    
    let nextTurn = 1 - myPlayerIdx;
    if(['skip', 'rev', 'd2', 'w4'].includes(playedCard.t)) {
        if(playedCard.t === 'd2') for(let i=0; i<2; i++) s.players[nextTurn].hand.push(s.drawPile.pop());
        if(playedCard.t === 'w4') for(let i=0; i<4; i++) s.players[nextTurn].hand.push(s.drawPile.pop());
        nextTurn = myPlayerIdx; 
    }

    if(s.players[myPlayerIdx].hand.length === 0) s.winner = myPlayerIdx;
    s.turn = nextTurn;
    s.players[myPlayerIdx].uno = false;
    await matchRef.set(s);
}

async function drawFromDeck() {
    AudioEngine.play('draw');
    const s = JSON.parse(JSON.stringify(gameState));
    if(s.drawPile.length === 0) {
        const top = s.discard.pop();
        s.drawPile = s.discard.sort(() => Math.random() - 0.5);
        s.discard = [top];
    }
    const drawn = s.drawPile.pop();
    s.players[myPlayerIdx].hand.push(drawn);
    if(!checkLegality(drawn, s.discard[s.discard.length-1])) s.turn = 1 - myPlayerIdx;
    await matchRef.set(s);
}

// --- CHAT SYSTEM ---
function setupChat(room) {
    const chatRef = db.ref(`chat/${room}`);
    chatRef.limitToLast(20).on('child_added', snap => {
        const m = snap.val();
        const d = document.createElement('div');
        d.className = m.sys ? 'msg system' : (m.p === myPlayerIdx ? 'msg me' : 'msg them');
        d.innerText = m.text;
        const box = document.getElementById('chatBox');
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    });
}

function sendText() {
    const input = document.getElementById('msgInput');
    if(!input.value) return;
    db.ref(`chat/${document.getElementById('roomInput').value.toUpperCase()}`).push({ p: myPlayerIdx, text: input.value });
    input.value = '';
}

function quickEmoji(e) {
    db.ref(`chat/${document.getElementById('roomInput').value.toUpperCase()}`).push({ p: myPlayerIdx, text: e });
}

function triggerUno(type) {
    const r = document.getElementById('roomInput').value.toUpperCase();
    if(type === 'uno') {
        if(gameState.players[myPlayerIdx].hand.length <= 2) {
            matchRef.child(`players/${myPlayerIdx}/uno`).set(true);
            db.ref(`chat/${r}`).push({ sys: true, text: `PLAYER ${myPlayerIdx+1} CALLED UNO!` });
        }
    } else {
        const opp = 1 - myPlayerIdx;
        if(gameState.players[opp].hand.length === 1 && !gameState.players[opp].uno) {
            db.ref(`chat/${r}`).push({ sys: true, text: `CAUGHT! PLAYER ${opp+1} DRAWS 2!` });
            drawFromDeck(); 
        }
    }
}
</script>
</body>
</html>
