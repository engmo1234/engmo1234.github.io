<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UNO PRESTIGE | FOR A SPECIAL FRIEND</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --gold: #f59e0b; --card-w: 100px; --card-h: 150px; }
        * { box-sizing: border-box; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { margin: 0; background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* LOBBY SCREEN */
        #lobby { position: fixed; inset: 0; background: #020617; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .setup-card { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid var(--gold); text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        /* GAME BOARD */
        #game-arena { display: none; flex: 1; grid-template-columns: 1fr 280px; }
        .table { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; position: relative; }
        
        /* HANDS */
        .hand { display: flex; justify-content: center; height: 180px; padding-top: 20px; }
        .card { 
            width: var(--card-w); height: var(--card-h); border-radius: 12px; border: 4px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900;
            margin-left: -40px; transition: 0.3s; cursor: pointer; background: #334155; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card:hover { transform: translateY(-40px) rotate(3deg); z-index: 100; }
        .playable { border-color: var(--gold) !important; box-shadow: 0 0 30px var(--gold); transform: translateY(-10px); }
        .unplayable { opacity: 0.2; filter: grayscale(1); cursor: not-allowed; pointer-events: none; }

        /* COLORS */
        .red { background: #ef4444; } .blue { background: #3b82f6; }
        .green { background: #22c55e; } .yellow { background: #eab308; color: #1e293b; }
        .wild { background: linear-gradient(45deg, #ef4444, #3b82f6, #22c55e, #eab308); }
        .back { background: #1e293b; border: 3px solid var(--gold); width: 80px; height: 120px; }

        .center-stack { display: flex; align-items: center; justify-content: center; gap: 40px; }
        #draw-pile { border: 3px dashed var(--gold); color: var(--gold); font-size: 4rem; background: #0f172a; margin: 0; }
        
        /* UI BUTTONS */
        .btn { padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-gold { background: var(--gold); color: #020617; }
        .btn-action { background: #334155; color: white; width: 120px; }

        /* SIDE PANEL */
        .sidebar { background: #020617; border-left: 2px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        #turn-msg { font-size: 1.4rem; font-weight: bold; text-align: center; margin-bottom: 20px; padding: 10px; border-radius: 10px; }
        
        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; display: none; place-items: center; }
        .win-overlay { position: fixed; inset: 0; background: #020617; z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="lobby">
    <div class="setup-card">
        <h1 style="color:var(--gold); font-size: 3rem; margin: 0;">UNO PRESTIGE</h1>
        <p style="opacity:0.6; margin-bottom: 30px;">Private 1v1 Room</p>
        <input type="text" id="room-id" placeholder="Enter Room Name" style="padding:15px; width:300px; border-radius:10px; border:none; text-align:center; font-size: 1.2rem; margin-bottom: 20px;">
        <br>
        <button class="btn btn-gold" style="width:300px;" onclick="joinGame()">START THE GIFT</button>
    </div>
</div>

<div id="game-arena">
    <div class="table">
        <div class="hand" id="opponent-hand"></div>
        
        <div class="center-stack">
            <div id="draw-pile" class="card" onclick="playerDraws()">🎴</div>
            <div id="discard-pile"></div>
        </div>

        <div class="hand" id="player-hand"></div>

        <div style="display:flex; gap:15px; justify-content:center;">
            <button class="btn btn-action" style="background:#ea580c;" onclick="unoTrigger('uno')">UNO!</button>
            <button class="btn btn-action" onclick="unoTrigger('catch')">CATCH</button>
            <button class="btn btn-action" style="background:#ef4444; width:80px;" onclick="hardReset()">♻️</button>
        </div>
    </div>

    <div class="sidebar">
        <div id="turn-msg">Waiting...</div>
        <div id="event-log" style="flex:1; font-size: 0.8rem; opacity:0.6; overflow-y:auto;"></div>
    </div>
</div>

<div id="color-picker" class="modal">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div onclick="finishWildPlay('red')" style="width:100px;height:100px;background:#ef4444;border-radius:50%;border:4px solid white;"></div>
        <div onclick="finishWildPlay('blue')" style="width:100px;height:100px;background:#3b82f6;border-radius:50%;border:4px solid white;"></div>
        <div onclick="finishWildPlay('green')" style="width:100px;height:100px;background:#22c55e;border-radius:50%;border:4px solid white;"></div>
        <div onclick="finishWildPlay('yellow')" style="width:100px;height:100px;background:#eab308;border-radius:50%;border:4px solid white;"></div>
    </div>
</div>

<div id="win-screen" class="win-overlay">
    <h1 id="victory-text" style="color:var(--gold); font-size: 5rem;">VICTORY</h1>
    <button class="btn btn-gold" onclick="location.reload()">NEW MATCH</button>
</div>

<script>
// --- CORE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyCQ7QZFblWwB530G2ARVPHvYLAsDf0Mwak",
    authDomain: "chessgame-e4dbb.firebaseapp.com",
    databaseURL: "https://chessgame-e4dbb-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "chessgame-e4dbb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let state = null, myId = null, gameRef = null, wildIdx = null;

async function joinGame() {
    const room = document.getElementById('room-id').value.trim().toUpperCase();
    if(!room) return;
    
    gameRef = db.ref(`uno_gift_v1/${room}`);
    const snap = await gameRef.once('value');
    
    // THE "IRONCLAD" RESET: If game is finished or empty, force a new start
    if(!snap.exists() || snap.val().winner !== null) {
        myId = 0;
        await hardReset();
    } else {
        myId = 1;
    }

    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game-arena').style.display = 'grid';
    gameRef.on('value', s => { state = s.val(); updateGame(); });
}

async function hardReset() {
    const d = generateDeck();
    const fresh = {
        players: {
            0: { hand: d.splice(0,7), uno: false },
            1: { hand: d.splice(0,7), uno: false }
        },
        drawPile: d,
        discard: [d.pop()],
        turn: 0,
        winner: null,
        logs: ["Match Started"]
    };
    await gameRef.set(fresh);
}

function generateDeck() {
    const colors = ['red','blue','green','yellow']; let d = [];
    colors.forEach(c => {
        for(let i=0; i<=9; i++) { d.push({t:'num', c, v:i}); if(i>0) d.push({t:'num', c, v:i}); }
        ['skip','rev','d2'].forEach(t => { d.push({t, c}); d.push({t, c}); });
    });
    for(let i=0; i<4; i++) { d.push({t:'wild'}); d.push({t:'w4'}); }
    return d.sort(() => Math.random() - 0.5);
}

function updateGame() {
    if(!state) return;
    
    // Winner Check
    if(state.winner !== null) {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('victory-text').innerText = state.winner === myId ? "YOU WON! 🏆" : "YOU LOST! 🃏";
        return;
    }

    const isTurn = state.turn === myId;
    const top = state.discard[state.discard.length-1];
    
    const msg = document.getElementById('turn-msg');
    msg.innerText = isTurn ? "YOUR TURN" : "THEIR TURN";
    msg.style.background = isTurn ? "var(--gold)" : "#1e293b";
    msg.style.color = isTurn ? "black" : "white";

    // Hands
    const oh = document.getElementById('opponent-hand'); oh.innerHTML = '';
    state.players[1-myId].hand.forEach(() => { const b = document.createElement('div'); b.className='card back'; oh.appendChild(b); });

    const mh = document.getElementById('player-hand'); mh.innerHTML = '';
    state.players[myId].hand.forEach((c, i) => {
        const canPlay = isTurn && isLegal(c, top);
        const el = createCardUI(c);
        if(canPlay) {
            el.classList.add('playable');
            el.onclick = () => { if(c.t.includes('w')) { wildIdx=i; document.getElementById('color-picker').style.display='grid'; } else handleMove(i); };
        } else {
            el.classList.add('unplayable');
        }
        mh.appendChild(el);
    });

    const disc = document.getElementById('discard-pile'); disc.innerHTML = '';
    disc.appendChild(createCardUI(top));
    
    document.getElementById('event-log').innerHTML = state.logs.slice(-5).reverse().join('<br>');
}

function createCardUI(c) {
    const div = document.createElement('div');
    div.className = `card ${c.t.includes('w') ? 'wild' : c.c}`;
    let val = c.v !== undefined ? c.v : (c.t==='skip'?'🚫':(c.t==='rev'?'⇄':(c.t==='d2'?'+2':(c.t==='wild'?'W':'+4'))));
    div.innerHTML = `<span>${val}</span>`;
    return div;
}

function isLegal(c, t) { return c.t.includes('w') || c.c === t.c || (c.v !== undefined && c.v === t.v) || (c.t !== 'num' && c.t === t.t); }

async function handleMove(idx, color = null) {
    const s = JSON.parse(JSON.stringify(state));
    const card = s.players[myId].hand.splice(idx, 1)[0];
    if(color) card.c = color;
    s.discard.push(card);
    
    let nxt = 1 - myId;
    if(['skip','rev','d2','w4'].includes(card.t)) {
        if(card.t==='d2') for(let k=0; k<2; k++) if(s.drawPile.length>0) s.players[nxt].hand.push(s.drawPile.pop());
        if(card.t==='w4') for(let k=0; k<4; k++) if(s.drawPile.length>0) s.players[nxt].hand.push(s.drawPile.pop());
        nxt = myId;
    }
    
    if(s.players[myId].hand.length === 0) s.winner = myId;
    s.turn = nxt; s.players[myId].uno = false;
    s.logs.push(`P${myId+1} played ${card.t}`);
    await gameRef.set(s);
}

async function playerDraws() {
    if(state.turn !== myId || state.winner !== null) return;
    const s = JSON.parse(JSON.stringify(state));
    if(s.drawPile.length === 0) {
        const t = s.discard.pop(); s.drawPile = s.discard.sort(()=>Math.random()-0.5); s.discard = [t];
    }
    const c = s.drawPile.pop();
    s.players[myId].hand.push(c);
    if(!isLegal(c, s.discard[s.discard.length-1])) s.turn = 1 - myId;
    s.logs.push(`P${myId+1} drew`);
    await gameRef.set(s);
}

function finishWildPlay(c) { document.getElementById('color-picker').style.display='none'; handleMove(wildIdx, c); }
function unoTrigger(t) {
    if(t==='uno') { if(state.players[myId].hand.length <= 2) gameRef.child(`players/${myId}/uno`).set(true); }
    else { if(state.players[1-myId].hand.length === 1 && !state.players[1-myId].uno) playerDraws(); }
}
</script>
</body>
</html>
